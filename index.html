<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tarefa IV</title>
</head>

<body>

    <div class="cabecalho">
        <h2>FM-Motors </h2>
        <input type="text" placeholder="Buscar carros...">
    </div>

    <div class="layout">

        <div class="menu">
            <ul>
                <li>Home</li>
                <li>Comprar</li>
                <li>Favoritos</li>
                <li>Contato</li>
            </ul>
        </div>

        <div class="conteudo">

            <div class="slider">
                <div class="slides">
                    <div class="slide"><img
                            src="https://t4.ftcdn.net/jpg/05/15/14/41/360_F_515144172_P0Qdo70Mg9QLSeyNK1hf4SPF1T0a0Eye.jpg">
                    </div>
                    <div class="slide"><img
                            src="https://t4.ftcdn.net/jpg/05/15/14/41/360_F_515144172_P0Qdo70Mg9QLSeyNK1hf4SPF1T0a0Eye.jpg">
                    </div>
                    <div class="slide"><img
                            src="https://t4.ftcdn.net/jpg/05/15/14/41/360_F_515144172_P0Qdo70Mg9QLSeyNK1hf4SPF1T0a0Eye.jpg">
                    </div>
                </div>
            </div>

            <h3></h3>

            <div class="cards">
                <div class="card">
                    <img
                        src="https://image.webmotors.com.br/_fotos/anunciousados/gigante/2026/202601/20260122/fiatpunto14attractive8vflex4pmanual-wmimagem09441621980.jpg?s=fill&w=1920&h=1440&q=75">
                    <div class="info">
                        <p>Fiat Punto 2014</p>
                        <p class="preco">R$ 40.000</p>
                    </div>
                </div>
            </div>
            <div class="cards">
                <div class="card">
                    <img
                        src="https://image.webmotors.com.br/_fotos/anunciousados/gigante/2026/202602/20260225/audia314tfsiflexsedanprestigetiptronic-wmimagem0800472963.jpg?s=fill&w=1920&h=1440&q=75">
                    <div class="info">
                        <p>Audi A3 2020</p>
                        <p class="preco">R$100.000</p>
                    </div>
                </div>
            </div>
            <div class="cards">
                <div class="card">
                    <img
                        src="https://image.webmotors.com.br/_fotos/anunciousados/gigante/2026/202603/20260303/bmw-320i-2.0-16v-turbo-flex-gp-automatico-wmimagem17454357947.jpg?s=fill&w=1920&h=1440&q=75">
                    <div class="info">
                        <p>BMW 320i 2023</p>
                        <p class="preco">R$230.000</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
